<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Unbreakable Explorer</title>
<!--
  Unbreakable Explorer — globe frontend for the Global Unbreakable
  disaster-resilience model. Country polygons come from the vendored Natural
  Earth 50m set. Countries not covered by the simulation render grey. Serve over
  http (e.g. `python3 -m http.server`) so the fetches resolve.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
<style>
  :root{
    --bg:#f5f7f9; --panel:#ffffff; --ink:#16202b; --ink-2:#48586a; --ink-3:#7d8b9a;
    --line:#e4e9ee; --line-2:#eef2f5; --accent:#0f6e63; --accent-soft:#e6f1ef;
    --shadow:0 1px 2px rgba(20,32,43,.04),0 8px 28px rgba(20,32,43,.07);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  #root{height:100%;}
  /* ---------- shell ---------- */
  .app{display:flex;flex-direction:column;height:100%;}
  header.bar{
    display:flex;align-items:center;gap:22px;padding:13px 22px;background:var(--panel);
    border-bottom:1px solid var(--line);z-index:30;flex-shrink:0;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .mark{
    font-family:'IBM Plex Serif',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;color:var(--ink);
  }
  .brand .mark b{color:var(--accent);}
  .brand .sub{font-size:11.5px;color:var(--ink-3);letter-spacing:.04em;text-transform:uppercase;}
  .grow{flex:1;}
  /* segmented variable selector */
  .seg{display:flex;background:var(--line-2);border-radius:10px;padding:3px;gap:2px;}
  .seg button{
    border:0;background:transparent;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--ink-2);
    padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:.16s;letter-spacing:-.005em;
  }
  .seg button:hover{color:var(--ink);}
  .seg button.on{background:var(--panel);color:var(--accent);box-shadow:0 1px 2px rgba(20,32,43,.08);}
  .ctrl{display:flex;align-items:center;gap:9px;}
  select,.btn{
    font-family:inherit;font-size:13px;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:9px;padding:8px 12px;cursor:pointer;transition:.15s;
  }
  select:hover,.btn:hover{border-color:#cdd6de;}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500;}
  .btn.primary:hover{filter:brightness(1.06);}
  .btn.primary:disabled{opacity:.45;cursor:not-allowed;filter:none;}
  /* ---------- stage ---------- */
  .stage{position:relative;flex:1;overflow:hidden;}
  #globe{position:absolute;top:0;bottom:0;left:0;right:468px;}
  .stage-grad{position:absolute;inset:0;pointer-events:none;background:
    radial-gradient(120% 90% at 38% 42%,transparent 60%,rgba(214,223,231,.55) 100%);}
  /* hover tooltip */
  .tip{
    position:fixed;pointer-events:none;z-index:60;background:rgba(22,32,43,.94);color:#fff;
    padding:9px 11px;border-radius:9px;font-size:12px;line-height:1.45;box-shadow:var(--shadow);
    max-width:230px;transform:translate(-50%,-115%);opacity:0;transition:opacity .12s;
  }
  .tip b{font-weight:600;}
  .tip .v{font-family:'IBM Plex Mono',monospace;color:#7fe3d3;font-weight:600;}
  .tip .meta{color:#aab8c4;font-size:11px;margin-top:2px;}
  .tip .na{color:#c9d3dc;font-size:11px;margin-top:3px;font-style:italic;}
  /* legend */
  .legend{
    position:absolute;left:22px;bottom:22px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);width:248px;
  }
  .legend h4{margin:0 0 3px;font-size:13px;font-weight:600;}
  .legend .desc{font-size:11px;color:var(--ink-3);line-height:1.4;margin-bottom:10px;}
  .legend .ramp{height:10px;border-radius:5px;}
  .legend .scale{display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;color:var(--ink-2);}
  .legend .polar{margin-top:8px;font-size:10.5px;color:var(--ink-3);display:flex;align-items:center;gap:5px;}
  .dirdot{width:7px;height:7px;border-radius:50%;}
  .legend .greyrow{margin-top:8px;font-size:10.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px;
    border-top:1px solid var(--line-2);padding-top:8px;}
  .legend .greyrow i{width:12px;height:12px;border-radius:3px;background:#dde4ea;border:1px solid #cfd7de;flex-shrink:0;}
  /* unified right sidebar (hosts global overview OR country profile) */
  .sidebar{
    position:absolute;top:16px;right:16px;height:calc(100% - 32px);width:452px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 18px 50px rgba(20,32,43,.16);display:flex;flex-direction:column;z-index:25;
  }
  .sheet-grab{display:none;}   /* drag handle — mobile only (see responsive block) */
  .ov-scroll{overflow:auto;padding:20px 22px 28px;flex:1;}
  .ov-jump{width:100%;margin:0 0 16px;}
  .ov-title{font-family:'IBM Plex Serif',serif;font-size:15px;font-weight:600;color:var(--ink);margin:0 0 16px;
    padding-bottom:13px;border-bottom:1px solid var(--line-2);letter-spacing:-.01em;}
  .ov-h{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin:0 0 2px;}
  .ov-stat{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;letter-spacing:-.02em;}
  .ov-stat .u{font-size:14px;color:var(--ink-3);font-weight:500;margin-left:4px;}
  .ov-sub{font-size:12px;color:var(--ink-2);margin-top:2px;}
  .grp-tabs{display:flex;gap:6px;margin:16px 0 11px;}
  .grp-tabs button{flex:1;border:1px solid var(--line);background:var(--panel);font-family:inherit;font-size:11.5px;
    color:var(--ink-2);padding:6px;border-radius:8px;cursor:pointer;font-weight:500;}
  .grp-tabs button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .barrow{margin:9px 0;cursor:pointer;}
  .barrow .lab{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px;color:var(--ink-2);}
  .barrow .lab b{color:var(--ink);font-weight:500;}
  .barrow .val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink);}
  .track{height:8px;background:var(--line-2);border-radius:5px;overflow:hidden;}
  .fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1);}
  .barrow.dim{opacity:.4;}
  /* box-and-whisker (median + IQR + 1.5·IQR) */
  .boxtrack{position:relative;height:20px;margin-top:3px;}
  .boxtrack .axis{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--line-2);}
  .boxtrack .whisker{position:absolute;top:50%;height:1.5px;background:var(--ink-3);transform:translateY(-50%);}
  .boxtrack .cap{position:absolute;top:50%;width:1.5px;height:10px;background:var(--ink-3);transform:translate(-50%,-50%);border-radius:1px;}
  .boxtrack .box{position:absolute;top:50%;height:12px;border-radius:3px;transform:translateY(-50%);
    transition:left .5s cubic-bezier(.4,0,.2,1),width .5s cubic-bezier(.4,0,.2,1);}
  .boxtrack .median{position:absolute;top:50%;width:2.5px;height:15px;background:var(--ink);transform:translate(-50%,-50%);border-radius:1px;}
  .ov-axis{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--ink-3);margin:2px 1px 0;}
  .boxlegend{display:flex;gap:14px;align-items:center;font-size:10.5px;color:var(--ink-3);margin-top:9px;flex-wrap:wrap;}
  .boxlegend span{display:inline-flex;align-items:center;gap:5px;}
  .lg-box{width:16px;height:9px;border-radius:2px;background:var(--ink-3);opacity:.5;}
  .lg-med{width:2.5px;height:12px;background:var(--ink);border-radius:1px;}
  .lg-wh{width:16px;height:0;border-top:1.5px solid var(--ink-3);}
  .ranklist{margin-top:14px;border-top:1px solid var(--line-2);padding-top:12px;}
  .ranklist h5{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);}
  .rank{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:5px 7px;border-radius:7px;cursor:pointer;}
  .rank:hover{background:var(--line-2);}
  .rank .nm{display:flex;gap:8px;align-items:center;}
  .rank .ix{color:var(--ink-3);width:14px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;}
  .rank .rv{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .hint{position:absolute;bottom:24px;left:calc((100% - 452px)/2);transform:translateX(-50%);font-size:12px;color:var(--ink-3);
    background:rgba(255,255,255,.85);padding:6px 13px;border-radius:20px;border:1px solid var(--line);}
  /* ---------- drawer ---------- */
  .dr-head{padding:18px 20px 14px;border-bottom:1px solid var(--line-2);position:relative;flex-shrink:0;}
  .dr-close{position:absolute;top:15px;right:16px;border:0;background:var(--line-2);width:28px;height:28px;border-radius:8px;
    cursor:pointer;color:var(--ink-2);font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .dr-close:hover{background:#e2e8ed;}
  .dr-country{font-family:'IBM Plex Serif',serif;font-size:23px;font-weight:600;letter-spacing:-.01em;}
  .chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--line-2);color:var(--ink-2);font-weight:500;}
  .chip.acc{background:var(--accent-soft);color:var(--accent);}
  .dr-body{overflow:auto;padding:16px 20px 30px;flex:1;}
  .sec-t{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin:20px 0 10px;font-weight:600;}
  .sec-t:first-child{margin-top:4px;}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:10px;}
  .metric{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--panel);transition:.15s;}
  .metric.active{border-color:var(--accent);background:var(--accent-soft);}
  .metric .ml{font-size:11px;color:var(--ink-2);line-height:1.3;height:28px;}
  .metric .mv{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;letter-spacing:-.02em;margin-top:5px;}
  .metric .mv .u{font-size:11px;color:var(--ink-3);font-weight:500;margin-left:3px;}
  /* quintile chart */
  .quint{display:flex;align-items:flex-end;gap:9px;height:118px;padding:6px 2px 0;}
  .qcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .qbar{width:100%;border-radius:5px 5px 2px 2px;transition:height .5s cubic-bezier(.4,0,.2,1);min-height:3px;}
  .qv{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:var(--ink-2);}
  .qlab{font-size:10px;color:var(--ink-3);text-align:center;line-height:1.2;}
  .qhead{display:flex;justify-content:space-between;align-items:baseline;}
  .qhead .sw{font-size:11px;color:var(--ink-3);}
  .qhead select{padding:4px 8px;font-size:11.5px;}
  /* unavailable notice (policies / missing data) */
  .unavail{border:1px dashed #cdd6de;border-radius:11px;padding:14px 15px;background:var(--line-2);}
  .unavail h5{margin:0 0 6px;font-size:12.5px;color:var(--ink-2);font-weight:600;display:flex;align-items:center;gap:7px;}
  .unavail .badge{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;color:#8a6d3b;
    background:#fbf2dd;border:1px solid #ecdcb0;border-radius:6px;padding:2px 6px;}
  .unavail p{margin:6px 0 0;font-size:11.5px;color:var(--ink-3);line-height:1.5;}
  .unavail ul{margin:8px 0 0;padding-left:16px;font-size:11.5px;color:var(--ink-3);line-height:1.5;}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    color:var(--ink-3);font-size:13px;z-index:40;text-align:center;padding:0 30px;}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .note{font-size:11px;color:var(--ink-3);line-height:1.5;margin-top:18px;border-top:1px solid var(--line-2);padding-top:12px;}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#d4dce2;border-radius:5px;border:2px solid var(--panel);}

  /* ---------- responsive: full-bleed globe + overlay sheet ----------
     The globe is fixed below the header and fills the width; the overview /
     country sheet starts low (peeking) and scrolls up OVER the globe.
     --head-h is measured in JS; --peek is the globe band left visible.

     The breakpoint deliberately matches on EITHER a narrow width (portrait
     phones) OR a short landscape screen, so a medium phone turned sideways
     keeps this stacked layout instead of dropping to the desktop layout.
     Keep MOBILE_MQ in the script in sync with this query. */
  @media (max-width:820px), (orientation:landscape) and (max-height:600px){
    header.bar{flex-wrap:wrap;gap:9px 14px;padding:10px 14px;}
    .brand .sub{display:none;}
    .grow{display:none;}
    .seg{order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .seg::-webkit-scrollbar{height:0;}

    /* the stage becomes the scroll container; globe is fixed behind it.
       --peek leaves the globe filling the screen with only the sheet header
       (drag handle + title) peeking up from the bottom edge. */
    .stage{--peek:calc(100vh - var(--head-h,84px) - 86px);
      --peek:calc(100dvh - var(--head-h,84px) - 86px);
      overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
    #globe,.stage-grad{position:fixed;left:0;right:0;top:var(--head-h,84px);bottom:0;z-index:0;}

    /* sheet header: drag bar + stretched up-chevron, sticky so it stays
       reachable once the sheet is scrolled up over the globe. */
    .sheet-grab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
      padding:10px 0 9px;position:sticky;top:0;z-index:6;background:var(--panel);
      border-radius:18px 18px 0 0;border-bottom:1px solid var(--line-2);cursor:pointer;
      -webkit-tap-highlight-color:transparent;}
    .sheet-grab::before{content:'';width:44px;height:5px;border-radius:3px;background:#cfd8df;}

    /* legend: compact overlay pinned just under the header, over the globe */
    .legend{position:fixed;left:10px;right:auto;top:calc(var(--head-h,84px) + 10px);bottom:auto;
      width:auto;max-width:62vw;padding:9px 11px;z-index:3;}
    .legend .desc{display:none;}
    .legend .greyrow{display:none;}

    /* sheet flows in the scroll container, offset down so the globe shows */
    .sidebar{position:relative;top:auto;right:auto;left:auto;bottom:auto;overflow:visible;
      width:auto;height:auto;min-height:calc(100vh - var(--head-h,84px));
      min-height:calc(100dvh - var(--head-h,84px));
      margin-top:var(--peek);border-radius:18px 18px 0 0;z-index:5;
      box-shadow:0 -12px 40px rgba(20,32,43,.18);}
    .ov-scroll{overflow:visible;flex:none;padding:18px 18px 44px;}
    .dr-body{overflow:visible;}
    .hint{display:none;}
  }
  @media (max-width:480px){
    .seg button{padding:7px 10px;font-size:12px;}
    .dr-country{font-size:20px;}
    .mgrid{grid-template-columns:1fr 1fr;}
    .legend{max-width:70vw;padding:8px 11px;}
    .legend .ramp{height:8px;}
    .legend .scale{font-size:9.5px;}
  }
  /* ---- policy what-if controls ---- */
  .whatif{margin-left:8px;font-size:10px;font-weight:600;color:#2166ac;background:#eaf1f8;border:1px solid #cfe0ef;border-radius:10px;padding:1px 7px;vertical-align:middle;text-transform:none;letter-spacing:0;}
  .mbase{font-size:10.5px;color:var(--ink-3);margin-top:3px;}
  .mbase .up{color:#1b7a5f;font-weight:600;} .mbase .dn{color:#b2182b;font-weight:600;}
  .polbox{display:flex;flex-direction:column;gap:11px;}
  .polhint{font-size:11.5px;color:var(--ink-3);line-height:1.45;}
  .pol-row{display:flex;flex-direction:column;gap:5px;}
  .pol-lab{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--ink-1,#1c2733);font-weight:500;gap:8px;}
  .pol-val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2166ac;font-weight:600;white-space:nowrap;}
  .scope-tog{display:inline-flex;margin-left:8px;border:1px solid #d3dce4;border-radius:7px;overflow:hidden;vertical-align:middle;}
  .scope-tog button{border:0;background:#f3f6f9;color:var(--ink-3);font-size:10.5px;padding:2px 7px;cursor:pointer;}
  .scope-tog button.on{background:#2166ac;color:#fff;}
  .pol-row input[type=range]{width:100%;accent-color:#2166ac;height:4px;cursor:pointer;}
  .pds-sel{width:100%;padding:6px 8px;border:1px solid #d3dce4;border-radius:8px;font:inherit;font-size:12.5px;background:#fff;color:inherit;}
  .polfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:2px;}
  .pol-reset{border:1px solid #d3dce4;background:#fff;border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;color:#1c2733;}
  .pol-reset:disabled{opacity:.45;cursor:default;}
  .polnote{font-size:10.5px;color:var(--ink-3);text-align:right;line-height:1.3;}
</style>
</head>
<body>
<div id="root"></div>
<div class="tip" id="tip"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo} = React;

const DATA_URL = './data/explorer_data.json';
const GEO_URL  = './data/ne_50m_admin_0_countries.json';
const GREY     = '#dde4ea';   // countries not covered by the simulation

/* ============================ VARIABLES ============================
   All values arrive already scaled in explorer_data.json:
   risk_to_* are expressed as % of GDP, resilience as %. */
const VARS={
  riskAssets:{label:'Risk to assets',short:'Assets',unit:'% GDP',stops:['#edf2f7','#9cc0d8','#2166ac'],bad:true,log:true,
    get:c=>c.riskAssets,fmt:v=>v.toFixed(2),
    desc:'Expected annual asset damages from disasters as a share of GDP.'},
  riskConsumption:{label:'Risk to consumption',short:'Consumption',unit:'% GDP',stops:['#f1eef6','#b3a2c7','#6a51a3'],bad:true,log:true,
    get:c=>c.riskConsumption,fmt:v=>v.toFixed(2),
    desc:'Expected annual consumption losses as a share of GDP.'},
  riskWellbeing:{label:'Risk to well-being',short:'Well-being',unit:'% GDP',stops:['#fdece8','#ec9a8d','#b2182b'],bad:true,log:true,
    get:c=>c.riskWellbeing,fmt:v=>v.toFixed(2),
    desc:'Expected annual well-being losses as a share of GDP.'},
  resilience:{label:'Socio-economic resilience',short:'Resilience',unit:'%',stops:['#eef6f3','#86c0ad','#1b7a5f'],bad:false,
    get:c=>c.resilience,fmt:v=>v.toFixed(0),
    desc:'Ratio of asset damages to well-being losses. Higher = a population maintains well-being despite larger asset damages.'},
};
const VAR_KEYS=Object.keys(VARS);

/* quintile sub-metrics (decompose exactly to the national totals) */
const QVARS={
  incomeShare  :{label:'Income share', unit:'%',     stops:['#dfeaf2','#86c0ad','#1b7a5f'], get:q=>q.incomeShare,  fmt:v=>v.toFixed(0)},
  riskWellbeing:{label:'Risk to well-being', unit:'% GDP', stops:VARS.riskWellbeing.stops, get:q=>q.riskWellbeing, fmt:v=>v.toFixed(2)},
  riskAssets   :{label:'Risk to assets', unit:'% GDP',     stops:VARS.riskAssets.stops,    get:q=>q.riskAssets,    fmt:v=>v.toFixed(2)},
};

/* color ramp utils */
function hx(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function ramp(stops,t){t=Math.max(0,Math.min(1,t));const n=stops.length-1;const i=Math.min(n-1,Math.floor(t*n));const f=t*n-i;
  const a=hx(stops[i]),b=hx(stops[i+1]);return `rgb(${Math.round(a[0]+(b[0]-a[0])*f)},${Math.round(a[1]+(b[1]-a[1])*f)},${Math.round(a[2]+(b[2]-a[2])*f)})`;}

function fmtNum(n){if(n==null)return '—';if(n>=1e9)return (n/1e9).toFixed(2)+'B';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return Math.round(n);}
function quantile(sorted,p){
  if(!sorted.length)return 0;
  const idx=(sorted.length-1)*p,lo=Math.floor(idx),hi=Math.ceil(idx);
  if(lo===hi)return sorted[lo];
  return sorted[lo]+(sorted[hi]-sorted[lo])*(idx-lo);
}

/* resolve an ISO3 code from a Natural Earth feature */
function featIso(p){
  for(const k of ['ISO_A3','ADM0_A3','ISO_A3_EH','SOV_A3']){
    const v=p[k]; if(v&&v!=='-99')return v;
  }
  return null;
}

/* ===================== POLICY EMULATOR (in-browser Matern-2.5 GP) =====================
   Each country has a small JSON (data/emulators/{iso}.json) carrying a fitted Gaussian-process
   emulator. We evaluate its predictive mean here — identical math to the Python emulator (verified
   to <1e-9). Outputs are absolute losses; the UI applies them as RATIOS to the baseline so the
   displayed baseline never shifts and only the policy effect is emulated. */
const EMU_CACHE={};                                    // iso -> Promise<emulator JSON>
const SQRT5=Math.sqrt(5);
function neutralPolicy(){
  return {scale_exposure:1,exposure_scope:'all',scale_vulnerability:1,vulnerability_scope:'all',
    scale_self_employment:1,scale_non_diversified_income:1,scale_gini_index:1,
    pds_variant:'uniform',pds_covered_loss_share:0};  // aid type is a toggle; 0% coverage = no aid
}
function isNeutral(p){const n=neutralPolicy();return Object.keys(n).every(k=>p[k]===n[k]);}
function featurizePolicy(p,features){
  const aid=p.pds_variant!=='none'&&p.pds_covered_loss_share>0;   // 0% coverage = no aid (matches the model)
  const cov=aid?p.pds_covered_loss_share:0;
  const m={scale_exposure:p.scale_exposure, exposure_q1:p.exposure_scope==='q1'?1:0,
    scale_vulnerability:p.scale_vulnerability, vulnerability_q1:p.vulnerability_scope==='q1'?1:0,
    scale_self_employment:p.scale_self_employment, scale_non_diversified_income:p.scale_non_diversified_income,
    scale_gini_index:p.scale_gini_index, pds_covered_loss_share:cov,
    pds_none:aid?0:1, pds_uniform:(aid&&p.pds_variant==='uniform')?1:0,
    pds_proportional:(aid&&p.pds_variant==='proportional')?1:0};
  return features.map(f=>m[f]);
}
function gpPredict(emu,out,xScaled){
  const o=emu.outputs[out], ls=o.length_scale, X=emu.Xtrain, alpha=o.alpha, C=o.C;
  let yn=0;
  for(let i=0;i<X.length;i++){const row=X[i]; let d2=0;
    for(let k=0;k<xScaled.length;k++){const t=(xScaled[k]-row[k])/ls[k]; d2+=t*t;}
    const d=Math.sqrt(d2);
    yn+=C*(1+SQRT5*d+5*d2/3)*Math.exp(-SQRT5*d)*alpha[i];
  }
  return Math.exp(o.ymean+o.ystd*yn);
}
function predictLosses(emu,policy,features){
  const sc=emu.scaler, x=featurizePolicy(policy,features);
  const xs=x.map((v,k)=>(v-sc.mean[k])/sc.scale[k]);
  const r={}; for(const out in emu.outputs) r[out]=gpPredict(emu,out,xs); return r;
}
function emuSelftest(emu,features){
  let worst=0;
  for(const c of (emu._selftest||[])){const got=predictLosses(emu,c.policy,features);
    for(const k in c.expected) worst=Math.max(worst,Math.abs(got[k]-c.expected[k])/Math.abs(c.expected[k]));}
  console[(worst<1e-6)?'log':'error']('emulator selftest '+emu.iso+': worst rel err '+worst.toExponential(2));
}
function loadEmulator(iso,features){
  if(!EMU_CACHE[iso]){
    EMU_CACHE[iso]=fetch('./data/emulators/'+iso+'.json')
      .then(r=>{if(!r.ok)throw new Error('no emulator');return r.json();})
      .then(e=>{emuSelftest(e,features);return e;});
  }
  return EMU_CACHE[iso];
}
/* ratio-anchored adjusted metrics: baseline country metrics scaled by the emulator's relative change */
function adjustedMetrics(c,emu,policy,features){
  const b=predictLosses(emu,neutralPolicy(),features), p=predictLosses(emu,policy,features);
  const rk=p.dk_tot/b.dk_tot, rw=p.dWtot_currency/b.dWtot_currency, rc=p.dc_tot/b.dc_tot;
  return {...c, riskAssets:c.riskAssets*rk, riskWellbeing:c.riskWellbeing*rw,
          riskConsumption:c.riskConsumption*rc, resilience:c.resilience*rk/rw};
}

/* Single source of truth for "are we in the stacked mobile layout?".
   Mirrors the CSS @media query so JS behaviour (hover tooltip, sheet
   auto-scroll) stays consistent with the layout — including when a phone is
   held in landscape (narrow width OR short landscape screen). */
const MOBILE_MQ='(max-width:820px), (orientation:landscape) and (max-height:600px)';
const isMobile=()=>window.matchMedia(MOBILE_MQ).matches;

/* ============================ APP ============================ */
function App(){
  const [feats,setFeats]=useState(null);
  const [data,setData]=useState(null);          // explorer_data.json
  const [byIso,setByIso]=useState({});
  const [manifest,setManifest]=useState(null);  // data/emulators/manifest.json (policy emulators)
  const [err,setErr]=useState(null);
  const [vk,setVk]=useState('resilience');
  const [sel,setSel]=useState(()=>{const h=(location.hash||'').replace('#','').toUpperCase();return h||null;}); // iso (deep-linkable via #ISO3)
  const [groupBy,setGroupBy]=useState('inc');   // inc | region
  const [hiGroup,setHiGroup]=useState(null);    // highlighted group value
  const elRef=useRef(), wRef=useRef();
  const headRef=useRef(), stageRef=useRef(), sheetRef=useRef();

  /* load simulation data + country polygons */
  useEffect(()=>{(async()=>{
    try{
      const [dRes,gRes]=await Promise.all([fetch(DATA_URL),fetch(GEO_URL)]);
      if(!dRes.ok)throw new Error('Could not load '+DATA_URL+' ('+dRes.status+')');
      if(!gRes.ok)throw new Error('Could not load '+GEO_URL+' ('+gRes.status+')');
      const d=await dRes.json(), g=await gRes.json();
      const bi={}; d.countries.forEach(c=>{bi[c.iso]=c;});
      const fs=(g.features||[]).filter(f=>{const n=f.properties.NAME||f.properties.ADMIN;return n&&n!=='Antarctica';});
      fs.forEach(f=>{const iso=featIso(f.properties); f.__c=iso?bi[iso]||null:null;});
      setData(d);setByIso(bi);setFeats(fs);
      /* policy emulators are optional: load the manifest if present, ignore if absent */
      fetch('./data/emulators/manifest.json').then(r=>r.ok?r.json():null).then(m=>setManifest(m)).catch(()=>{});
    }catch(e){setErr(e.message);}
  })();},[]);

  /* keep the URL hash in sync with the selected country (shareable deep links: index.html#ARG) */
  useEffect(()=>{const h=sel?('#'+sel):'';
    if((location.hash||'')!==h) history.replaceState(null,'',location.pathname+location.search+h);
  },[sel]);

  const countries = data?data.countries:[];
  const V=VARS[vk];
  const vkRef=useRef(vk); vkRef.current=vk;   // current metric for the (once-registered) hover handler
  const domain=useMemo(()=>{
    if(!countries.length)return [0,1];
    const vals=countries.map(c=>V.get(c)).sort((a,b)=>a-b);
    return [vals[0], vals[vals.length-1]];         // true min / max
  },[countries,vk]);

  /* normalised [0,1] position of a value on the current scale (log for skewed
     risk metrics, linear otherwise). Shared by the globe, legend and box plots. */
  const scaleT=(v)=>{
    if(V.log){const a=Math.log(domain[0]),b=Math.log(domain[1]);
      return (Math.log(Math.max(v,1e-12))-a)/(b-a);}
    return (v-domain[0])/(domain[1]-domain[0]);
  };

  const colorFor=(c)=>{
    if(!c)return GREY;                              // not covered by the simulation
    if(hiGroup){const g=groupBy==='inc'?c.incomeGroup:c.region; if(g!==hiGroup)return '#e6ebef';}
    return ramp(V.stops,scaleT(V.get(c)));
  };

  /* init globe once feats ready */
  const hoverRef=useRef(null);

  /* expose the header height as --head-h so the fixed mobile globe/legend
     sit exactly below it (no hard-coded guess). */
  useEffect(()=>{
    const set=()=>{if(headRef.current)document.documentElement.style.setProperty('--head-h',headRef.current.offsetHeight+'px');};
    set();window.addEventListener('resize',set);
    const ro=headRef.current?new ResizeObserver(set):null;ro&&ro.observe(headRef.current);
    return ()=>{window.removeEventListener('resize',set);ro&&ro.disconnect();};
  },[feats,data]);

  /* mobile: when a country is picked, slide the bottom sheet up over the globe;
     when cleared, scroll back down to reveal the globe. */
  useEffect(()=>{
    if(!isMobile())return;
    if(sel&&sheetRef.current)sheetRef.current.scrollIntoView({behavior:'smooth',block:'start'});
    else if(!sel&&stageRef.current)stageRef.current.scrollTo({top:0,behavior:'smooth'});
  },[sel]);

  /* tap the sheet header to toggle between peeking and fully scrolled-up */
  const toggleSheet=()=>{
    const st=stageRef.current,sh=sheetRef.current;if(!st||!sh)return;
    if(st.scrollTop>10)st.scrollTo({top:0,behavior:'smooth'});
    else sh.scrollIntoView({behavior:'smooth',block:'start'});
  };

  useEffect(()=>{
    if(!feats||!elRef.current||wRef.current)return;
    const w=Globe()(elRef.current)
      .backgroundColor('rgba(0,0,0,0)')
      .showAtmosphere(true).atmosphereColor('#bcd6e8').atmosphereAltitude(0.20)
      .showGraticules(true)
      .polygonsData(feats)
      .polygonAltitude(f=>f===hoverRef.current?0.045:0.012)
      .polygonCapColor(f=>colorFor(f.__c))
      .polygonSideColor(()=>'rgba(120,140,160,0.10)')
      .polygonStrokeColor(()=>'rgba(255,255,255,0.55)')
      .onPolygonHover(onHover)
      .onPolygonClick(f=>{if(f.__c)setSel(f.__c.iso);})
      .onGlobeClick(()=>{setSel(null);});
    try{w.globeMaterial().color.set('#9cc1da');w.globeMaterial().shininess=2;}catch(e){}
    try{const ls=w.lights()||[];ls.forEach(l=>{if(/Ambient/i.test(l.type))l.intensity=3.1;else l.intensity=0.25;});w.lights(ls);}catch(e){}
    w.controls().autoRotate=true;w.controls().autoRotateSpeed=0.42;w.controls().enableZoom=true;
    w.pointOfView({lat:18,lng:8,altitude:2.3},0);
    wRef.current=w;
    const stop=()=>{w.controls().autoRotate=false;};
    elRef.current.addEventListener('pointerdown',stop);
    const onResize=()=>{w.width(elRef.current.clientWidth);w.height(elRef.current.clientHeight);};
    onResize();window.addEventListener('resize',onResize);
    const ro=new ResizeObserver(onResize);ro.observe(elRef.current);
    return ()=>{window.removeEventListener('resize',onResize);ro.disconnect();};
  },[feats]);

  function onHover(f){
    hoverRef.current=f;const w=wRef.current;if(!w)return;
    w.polygonAltitude(ff=>ff===f?0.045:0.012);
    const tip=document.getElementById('tip');
    if(isMobile()){tip.style.opacity=0;return;}   // no hover tooltip on mobile / touch
    if(f){
      tip.style.opacity=1;
      const nm=f.properties.NAME_LONG||f.properties.NAME||f.properties.ADMIN||'';
      if(f.__c){const c=f.__c;const Vh=VARS[vkRef.current];
        tip.innerHTML=`<b>${c.name}</b><div class="meta">${c.incomeLabel} · ${c.regionLabel}</div>
          <div style="margin-top:4px">${Vh.label}: <span class="v">${Vh.fmt(Vh.get(c))}${Vh.unit==='%'?'%':' '+Vh.unit}</span></div>`;
      }else{
        tip.innerHTML=`<b>${nm}</b><div class="na">Not covered by the simulation</div>`;
      }
      const mv=e=>{tip.style.left=e.clientX+'px';tip.style.top=e.clientY+'px';};
      window.__mv&&window.removeEventListener('pointermove',window.__mv);window.__mv=mv;window.addEventListener('pointermove',mv);
    } else {tip.style.opacity=0;}
  }

  /* recolor on variable / highlight change */
  useEffect(()=>{const w=wRef.current;if(!w)return;
    w.polygonCapColor(f=>colorFor(f.__c));},[vk,domain,hiGroup,groupBy]);

  /* focus camera on selection */
  useEffect(()=>{const w=wRef.current;if(!w||!sel)return;const c=byIso[sel];if(!c)return;
    const feat=feats.find(f=>f.__c===c); if(!feat)return;
    const p=repPoint(feat);if(p){
      w.controls().autoRotate=false;w.pointOfView({lat:p.lat,lng:p.lng,altitude:1.9},900);}},[sel]);

  /* representative point: centroid of the country's largest polygon (the mainland),
     so overseas territories / antimeridian-crossing parts don't skew the camera. */
  function repPoint(f){try{
    const g=f.geometry; if(!g)return null;
    const polys=g.type==='MultiPolygon'?g.coordinates:[g.coordinates];   // each: [outerRing, ...holes]
    let best=null,bestArea=-1;
    for(const poly of polys){
      const ring=poly[0]; if(!ring||ring.length<3)continue;
      let A=0,Cx=0,Cy=0;
      for(let i=0;i<ring.length-1;i++){
        const [x0,y0]=ring[i],[x1,y1]=ring[i+1];const cross=x0*y1-x1*y0;
        A+=cross;Cx+=(x0+x1)*cross;Cy+=(y0+y1)*cross;
      }
      A*=0.5;
      let cx,cy;
      if(Math.abs(A)>1e-9){cx=Cx/(6*A);cy=Cy/(6*A);}
      else{cx=ring.reduce((s,p)=>s+p[0],0)/ring.length;cy=ring.reduce((s,p)=>s+p[1],0)/ring.length;}
      const area=Math.abs(A);
      if(area>bestArea){bestArea=area;best={lng:cx,lat:cy};}
    }
    return best;
  }catch(e){return null;}}

  const cur=sel?byIso[sel]:null;

  /* group aggregates */
  const groups=useMemo(()=>{
    if(!countries.length)return [];
    const keyf=groupBy==='inc'?(c=>c.incomeGroup):(c=>c.region);
    const order=groupBy==='inc'?(data.incomeOrder||null):null;
    const labelf=groupBy==='inc'?(c=>c.incomeLabel):(c=>c.regionLabel);
    const m={},lab={};countries.forEach(c=>{const k=keyf(c);(m[k]=m[k]||[]).push(c);lab[k]=labelf(c);});
    let arr=Object.entries(m).map(([k,cs])=>{
      const vals=cs.map(c=>V.get(c)).sort((a,b)=>a-b);
      const q1=quantile(vals,0.25),med=quantile(vals,0.5),q3=quantile(vals,0.75);
      const iqr=q3-q1;
      const loW=Math.max(vals[0],q1-1.5*iqr);
      const hiW=Math.min(vals[vals.length-1],q3+1.5*iqr);
      return {key:k,label:lab[k],med,q1,q3,iqr,loW,hiW,n:cs.length};
    });
    if(order)arr.sort((a,b)=>order.indexOf(a.key)-order.indexOf(b.key));
    else arr.sort((a,b)=>b.med-a.med);
    return arr;
  },[countries,groupBy,vk]);
  const globalMedian=countries.length?quantile(countries.map(c=>V.get(c)).sort((a,b)=>a-b),0.5):0;

  const ranked=useMemo(()=>[...countries].sort((a,b)=>V.get(b)-V.get(a)),[countries,vk]);

  /* report */
  function downloadReport(){
    const rows=cur?reportCountry(cur):reportGlobal(V,globalMedian,groups,ranked,groupBy,data);
    const html=reportHTML(cur?cur.name:'Global overview',V,rows);
    const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=`unbreakable-${(cur?cur.name:'global').toLowerCase().replace(/\W+/g,'-')}.html`;a.click();
  }

  const ready=feats&&data;

  return (
    <div className="app">
      <header className="bar" ref={headRef}>
        <div className="brand">
          <span className="mark">Un<b>break</b>able<span style={{color:'var(--ink-3)',fontWeight:500}}> Explorer</span></span>
          <span className="sub">Disaster resilience atlas · baseline</span>
        </div>
        <div className="seg">
          {VAR_KEYS.map(k=><button key={k} className={k===vk?'on':''} onClick={()=>setVk(k)}>{VARS[k].label}</button>)}
        </div>
        <div className="grow"></div>
      </header>

      <div className="stage" ref={stageRef}>
        <div id="globe" ref={elRef}></div>
        <div className="stage-grad"></div>
        {!ready&&!err&&<div className="loading"><div className="spinner"></div>Loading baseline simulation…</div>}
        {err&&<div className="loading"><div style={{fontSize:22}}>⚠︎</div>
          <div>{err}</div>
          <div style={{fontSize:11.5,maxWidth:340}}>Run <code>python3 build_data.py</code> to generate the data, then serve the folder over http (e.g. <code>python3 -m http.server</code>) — opening the file directly via <code>file://</code> blocks the data fetches.</div></div>}

        {/* legend */}
        {ready&&<div className="legend">
          <h4>{V.label}</h4>
          <div className="desc">{V.desc}</div>
          <div className="ramp" style={{background:`linear-gradient(90deg,${V.stops.join(',')})`}}></div>
          <div className="scale mono"><span>{V.fmt(domain[0])}{V.unit==='%'?'%':''}</span>
            <span>{V.log?V.fmt(Math.exp((Math.log(domain[0])+Math.log(domain[1]))/2))+(V.unit==='%'?'%':''):(V.unit!=='%'?V.unit:'')}</span>
            <span>{V.fmt(domain[1])}{V.unit==='%'?'%':''}</span></div>
          <div className="polar"><span className="dirdot" style={{background:V.stops[V.stops.length-1]}}></span>
            Darker = {V.bad?'higher risk / worse':'more resilient / better'}{V.unit!=='%'?' · '+V.unit:''}{V.log?' · log scale':''}</div>
          <div className="greyrow"><i></i>Grey = not covered by the simulation</div>
        </div>}

        {/* unified sidebar: global overview OR country profile */}
        {ready&&<aside className="sidebar" ref={sheetRef}>
        <div className="sheet-grab" onClick={toggleSheet} role="button" aria-label="Expand or collapse panel"></div>
        {cur ? <CountryPanel c={cur} vk={vk} onClose={()=>setSel(null)}
                 hasEmu={!!(manifest&&manifest.countries.includes(cur.iso))} manifest={manifest}/>
        : <div className="ov-scroll">
          <p className="ov-title">Global overview</p>
          <select className="ov-jump" value={sel||''} onChange={e=>setSel(e.target.value||null)}>
            <option value="">Jump to country…</option>
            {[...countries].sort((a,b)=>a.name.localeCompare(b.name)).map(c=><option key={c.iso} value={c.iso}>{c.name}</option>)}
          </select>
          <p className="ov-h">Global median · {V.label}</p>
          <div className="ov-stat mono">{V.fmt(globalMedian)}<span className="u">{V.unit}</span></div>
          <div className="ov-sub">{countries.length} countries simulated · {data.framework}</div>

          <div className="grp-tabs">
            <button className={groupBy==='inc'?'on':''} onClick={()=>{setGroupBy('inc');setHiGroup(null);}}>By income group</button>
            <button className={groupBy==='region'?'on':''} onClick={()=>{setGroupBy('region');setHiGroup(null);}}>By region</button>
          </div>
          {groups.map(g=>{
            const pos=v=>Math.max(0,Math.min(100,scaleT(v)*100));
            const lo=pos(g.loW),hi=pos(g.hiW),b1=pos(g.q1),b3=pos(g.q3),md=pos(g.med);
            return (
            <div key={g.key} className={'barrow'+(hiGroup&&hiGroup!==g.key?' dim':'')}
                 onClick={()=>setHiGroup(hiGroup===g.key?null:g.key)}>
              <div className="lab"><b>{g.label}</b><span className="val mono">{V.fmt(g.med)}{V.unit==='%'?'%':' '+V.unit}</span></div>
              <div className="boxtrack">
                <div className="axis"></div>
                <div className="whisker" style={{left:lo+'%',width:(hi-lo)+'%'}}></div>
                <div className="cap" style={{left:lo+'%'}}></div>
                <div className="cap" style={{left:hi+'%'}}></div>
                <div className="box" style={{left:b1+'%',width:(b3-b1)+'%',
                  background:ramp(V.stops,scaleT(g.med)),opacity:.85}}></div>
                <div className="median" style={{left:md+'%'}}></div>
              </div>
            </div>
            );
          })}
          <div className="ov-axis"><span>{V.fmt(domain[0])}{V.unit==='%'?'%':''}</span><span>{V.fmt(domain[1])}{V.unit==='%'?'%':''}</span></div>
          <div className="boxlegend">
            <span><i className="lg-med"></i>median</span>
            <span><i className="lg-box"></i>IQR (Q1–Q3)</span>
            <span><i className="lg-wh"></i>1.5·IQR range</span>
          </div>
          <div className="ov-sub" style={{marginTop:8,fontSize:11,color:'var(--ink-3)'}}>{hiGroup?'Highlighted on globe — click again to clear':'Click a group to highlight it on the globe'}</div>

          <div className="ranklist">
            <h5>{V.bad?'Highest':'Top'} — {V.short}</h5>
            {ranked.slice(0,5).map((c,i)=><div key={c.iso} className="rank" onClick={()=>setSel(c.iso)}>
              <span className="nm"><span className="ix">{i+1}</span>{c.name}</span><span className="rv">{V.fmt(V.get(c))}{V.unit==='%'?'%':''}</span></div>)}
            <h5 style={{marginTop:12}}>{V.bad?'Lowest':'Bottom'} — {V.short}</h5>
            {ranked.slice(-5).map((c,i)=><div key={c.iso} className="rank" onClick={()=>setSel(c.iso)}>
              <span className="nm"><span className="ix">{ranked.length-4+i}</span>{c.name}</span><span className="rv">{V.fmt(V.get(c))}{V.unit==='%'?'%':''}</span></div>)}
          </div>
        </div>}
        </aside>}

        {ready&&!cur&&<div className="hint">Click any simulated country on the globe to open its resilience profile</div>}
      </div>
    </div>
  );
}

/* ---------- country profile panel ---------- */
function CountryPanel({c,vk,onClose,hasEmu,manifest}){
  const metricKeys=['riskAssets','riskConsumption','riskWellbeing','resilience'];
  const Q=QVARS.incomeShare;                 // quintile breakdown shows income share only
  const hasQuint=c.quint&&c.quint.length;
  const qvals=hasQuint?c.quint.map(Q.get):[];
  const qmax=hasQuint?Math.max(...qvals,1e-9):1;
  const qlabels=['Poorest','Q2','Q3','Q4','Richest'];

  /* policy what-if state (lazy-loads the country's emulator) */
  const [policy,setPolicy]=useState(neutralPolicy());
  const [emu,setEmu]=useState(null);
  useEffect(()=>{
    setPolicy(neutralPolicy()); setEmu(null);
    if(hasEmu&&manifest){let live=true;
      loadEmulator(c.iso,manifest.features).then(e=>{if(live)setEmu(e);}).catch(()=>{});
      return ()=>{live=false;};}
  },[c.iso,hasEmu]);
  const adjusted=useMemo(()=>emu?adjustedMetrics(c,emu,policy,manifest.features):c,[c,emu,policy,manifest]);
  const active=!!emu&&metricKeys.some(k=>Math.abs(VARS[k].get(adjusted)-VARS[k].get(c))>1e-9);

  const setLever=(k,v)=>setPolicy(p=>({...p,[k]:v}));
  const setScope=(key,scope)=>{
    const sf=key==='scale_exposure'?'exposure_scope':'vulnerability_scope';
    const floor=(emu&&emu.q1_floor[key])||0.75;
    setPolicy(p=>({...p,[sf]:scope,[key]:(scope==='q1'&&p[key]<floor)?floor:p[key]}));
  };

  return (<>
    <div className="dr-head">
      <button className="dr-close" onClick={onClose}>✕</button>
      <div className="dr-country">{c.name}</div>
      <div className="chips">
        <span className="chip acc">{c.incomeLabel}</span>
        <span className="chip">{c.regionLabel}</span>
        {c.pop&&<span className="chip">pop {fmtNum(c.pop)}</span>}
        {c.gdppc&&<span className="chip">GDP/cap ${fmtNum(c.gdppc)}</span>}
        {c.gini!=null&&<span className="chip">Gini {c.gini.toFixed(0)}</span>}
      </div>
    </div>
    <div className="dr-body">
      <div className="sec-t">Risk &amp; resilience profile{active&&<span className="whatif">policy what-if</span>}</div>
      <div className="mgrid">
        {metricKeys.map(k=>{
          const Vk=VARS[k]; const av=Vk.get(adjusted), bv=Vk.get(c);
          const chg=active&&Math.abs(av-bv)>1e-9;
          return (<div key={k} className={'metric'+(k===vk?' active':'')}>
            <div className="ml">{Vk.label}</div>
            <div className="mv">{Vk.fmt(av)}<span className="u">{Vk.unit}</span></div>
            {chg&&<div className="mbase">baseline {Vk.fmt(bv)}{Vk.unit==='%'?'%':''} <span className={((av>bv)===Vk.bad)?'dn':'up'}>{av>bv?'▲':'▼'} {Vk.fmt(Math.abs(av-bv))}</span></div>}
          </div>);
        })}
      </div>

      <div className="sec-t"><span>Income share by household quintile</span></div>
      {hasQuint?<>
      <div className="quint">
        {c.quint.map(q=>(
          <div className="qcol" key={q.q}>
            <span className="qv">{Q.fmt(Q.get(q))}{Q.unit==='%'?'%':''}</span>
            <div className="qbar" style={{height:(Q.get(q)/qmax*92)+'%',background:ramp(Q.stops,Q.get(q)/qmax)}}></div>
            <span className="qlab">{qlabels[q.q-1]}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:'var(--ink-3)',marginTop:6,lineHeight:1.4}}>
        Income quintiles, poorest (Q1) to richest (Q5).
      </div>
      </>:<div style={{fontSize:11.5,color:'var(--ink-3)'}}>No quintile breakdown available for this country.</div>}

      <div className="sec-t">Policy simulation</div>
      {hasEmu ? (!emu ? <div className="unavail"><p>Loading policy emulator…</p></div> :
        <div className="polbox">
          <div className="polhint">Dial in resilience policies — the four metrics update live via this
            country's emulator (≈ the full model, validated to within a few %). Any combination works.</div>
          {manifest.levers.map(lv=>{
            const sf=lv.key==='scale_exposure'?'exposure_scope':(lv.key==='scale_vulnerability'?'vulnerability_scope':null);
            const scope=sf?policy[sf]:'all';
            const floor=(lv.scope&&scope==='q1'&&emu.q1_floor[lv.key])?emu.q1_floor[lv.key]:lv.min;
            const maxRed=Math.round((1-floor)*1000)/10;
            const red=Math.round((1-policy[lv.key])*1000)/10;
            return (<div className="pol-row" key={lv.key}>
              <div className="pol-lab"><span>{lv.label}
                {lv.scope&&<span className="scope-tog">
                  <button className={scope==='all'?'on':''} onClick={()=>setScope(lv.key,'all')}>All</button>
                  <button className={scope==='q1'?'on':''} onClick={()=>setScope(lv.key,'q1')}>Poorest 20%</button>
                </span>}</span>
                <span className="pol-val">{red>0?'−'+red+'%':'—'}</span></div>
              <input type="range" min="0" max={maxRed} step="0.5" value={red}
                onChange={e=>setLever(lv.key,Math.round((1-(+e.target.value)/100)*1e6)/1e6)}/>
            </div>);
          })}
          <div className="pol-row">
            <div className="pol-lab"><span>Disaster aid
              <span className="scope-tog">
                <button className={policy.pds_variant!=='proportional'?'on':''} onClick={()=>setPolicy(p=>({...p,pds_variant:'uniform'}))}>Post-disaster support</button>
                <button className={policy.pds_variant==='proportional'?'on':''} onClick={()=>setPolicy(p=>({...p,pds_variant:'proportional'}))}>Insurance</button>
              </span></span>
              <span className="pol-val">{policy.pds_covered_loss_share>0?Math.round(policy.pds_covered_loss_share*100)+'%':'—'}</span></div>
            <input type="range" min="0" max={Math.round(manifest.pds.covered_range[1]*100)} step="1"
              value={Math.round(policy.pds_covered_loss_share*100)}
              onChange={e=>setLever('pds_covered_loss_share',(+e.target.value)/100)}/>
          </div>
          <div className="polfoot">
            <button className="pol-reset" disabled={!active} onClick={()=>setPolicy(neutralPolicy())}>Reset to baseline</button>
            <span className="polnote">Country-level effect; quintile chart shows the baseline distribution.</span>
          </div>
        </div>
      ) : (
        <div className="unavail">
          <h5><span className="badge">Not available</span> Policy scenarios unavailable</h5>
          <p>No policy emulator is bundled for this country yet. Countries that ship an emulator
            (<code>data/emulators/&lt;ISO3&gt;.json</code>) expose interactive resilience policies here —
            adding more is just a matter of dropping in their emulator data.</p>
        </div>
      )}

      <div className="note">{hasEmu?'Policy effects are emulated from the Global Unbreakable model (per-country Gaussian-process surrogate); baseline from ':'Source: baseline simulation outputs ('}
        <code>simulation_data/0_baseline</code>{hasEmu?'.':')'} Socio-economic resilience = expected asset damages ÷ expected well-being losses.</div>
    </div>
  </>);
}

/* ---------- report builders ---------- */
function reportCountry(c){
  const rows=[
    ['Region',c.regionLabel],['Income group',c.incomeLabel],
    c.gdppc?['GDP per capita','$'+fmtNum(c.gdppc)]:null,
    c.pop?['Population',fmtNum(c.pop)]:null,
    c.gini!=null?['Gini index',c.gini.toFixed(1)]:null,
    ['Risk to assets',c.riskAssets.toFixed(2)+'% GDP'],
    ['Risk to consumption',c.riskConsumption.toFixed(2)+'% GDP'],
    ['Risk to well-being',c.riskWellbeing.toFixed(2)+'% GDP'],
    ['Socio-economic resilience',c.resilience.toFixed(0)+'%'],
  ].filter(Boolean);
  if(c.quint&&c.quint.length){
    rows.push(['— Risk to well-being by income quintile (% GDP)','']);
    const lab=['Poorest','Q2','Q3','Q4','Richest'];
    c.quint.forEach(q=>rows.push([lab[q.q-1]+' (income '+q.incomeShare.toFixed(0)+'%)',q.riskWellbeing.toFixed(3)]));
  }
  return rows;
}
function reportGlobal(V,avg,groups,ranked,groupBy,data){
  const rows=[['Indicator',V.label],['Global median',V.fmt(avg)+(V.unit==='%'?'%':' '+V.unit)],['Countries',ranked.length]];
  rows.push(['— Grouped by',groupBy==='inc'?'income group':'region']);
  groups.forEach(g=>rows.push([g.label+' (median · IQR)',
    V.fmt(g.med)+'  ['+V.fmt(g.q1)+'–'+V.fmt(g.q3)+']'+(V.unit==='%'?'%':' '+V.unit)]));
  rows.push(['Highest '+V.short,ranked[0].name+' ('+V.fmt(V.get(ranked[0]))+')'],
            ['Lowest '+V.short,ranked[ranked.length-1].name+' ('+V.fmt(V.get(ranked[ranked.length-1]))+')']);
  return rows;
}
function reportHTML(title,V,rows){
  return `<!doctype html><meta charset=utf8><title>Unbreakable — ${title}</title>
  <style>body{font-family:'IBM Plex Sans',Georgia,serif;max-width:720px;margin:48px auto;padding:0 24px;color:#16202b}
  h1{font-family:Georgia,serif;font-size:26px;border-bottom:3px solid #0f6e63;padding-bottom:10px}
  .sub{color:#7d8b9a;font-size:13px;margin-top:-6px}
  table{width:100%;border-collapse:collapse;margin-top:24px}
  td{padding:10px 4px;border-bottom:1px solid #e4e9ee;font-size:14px}
  td:last-child{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  .ft{margin-top:32px;color:#7d8b9a;font-size:12px;line-height:1.5}</style>
  <h1>${title}</h1><div class="sub">Unbreakable Explorer · ${V.label} view · baseline simulation · generated ${new Date().toLocaleDateString()}</div>
  <table>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>
  <div class="ft">Generated from the Global Unbreakable baseline simulation outputs. Socio-economic resilience is
  the ratio of expected asset damages to expected well-being losses.</div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
